name: generate animation

on:
  # Tự động chạy mỗi 24 giờ
  schedule:
    - cron: "0 */24 * * *" 
  
  # Cho phép bạn bấm nút chạy thủ công bất cứ lúc nào
  workflow_dispatch:
  
  # Chạy mỗi khi bạn push code mới lên nhánh main
  push:
    branches:
    - main
    
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Bước tạo ra file ảnh con rắn (.svg)
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Meoneff
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Bước đẩy file ảnh đó vào một nhánh riêng tên là 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
